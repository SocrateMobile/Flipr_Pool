# Exemple de configuration Lovelace avec la carte "Pool Monitor Card"
# Cette carte nécessite l'installation préalable de "pool-monitor-card" via HACS Frontend.
# https://github.com/aallinne/pool-monitor-card

type: custom:pool-monitor-card
title: Ma Piscine
temperature: sensor.flipr_temperature_eau
ph: sensor.flipr_ph
orp: sensor.flipr_redox
tds: sensor.flipr_conductivite
chlorine: sensor.flipr_chlore
filter: switch.flipr_pompe_filtration

# Options d'affichage
show_names: true
show_labels: true
compact: false

# Définition des cibles (Setpoints) Flipr
override:
  ph:
    min: 6.8
    max: 8.0
    setpoint: 7.4
    step: 0.1
  orp:
    min: 500
    max: 900
    setpoint: 700
    step: 10
  chlorine:
    min: 0.0
    max: 3.5
    setpoint: 2.0
    step: 0.5
